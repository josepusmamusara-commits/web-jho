<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nalya ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 500px;
    text-align: center;
    margin-top: 80px;
}

/* MENU */
.menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.menu button {
    padding: 12px 18px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    font-size: 14px;
}

/* PAGE */
.page {
    display: none;
    margin-top: 30px;
}

.active {
    display: block;
}

/* TEXT */
h2 {
    font-size: 26px;
}

p {
    font-size: 18px;
}

/* BUTTON */
.next-btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

/* HATI */
.heart {
    position: fixed;
    color: red;
    animation: jatuh 5s linear infinite;
}

@keyframes jatuh {
    0% { top: -10%; }
    100% { top: 110%; }
}

/* GAME */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
}

.card {
    width: 80px;
    height: 80px;
    background: white;
    color: #ff4d6d;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    cursor: pointer;
    border-radius: 12px;
}

.open {
    background: pink;
}

#msg {
    margin-top: 15px;
    font-size: 20px;
}

/* BONEKA */
.teddy {
    position: fixed;
    font-size: 80px;
}

.t1 {
    bottom: 15px;
    right: 15px;
    animation: goyang 2s infinite alternate;
}

.t2 {
    bottom: 15px;
    left: 15px;
    animation: lompat 1s infinite;
}

.t3 {
    bottom: 120px;
    animation: jalan 10s linear infinite;
}

@keyframes goyang {
    0% { transform: rotate(-10deg); }
    100% { transform: rotate(10deg); }
}

@keyframes lompat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
}

@keyframes jalan {
    0% { left: -100px; }
    100% { left: 100%; }
}

/* BUBBLE */
.bubble {
    position: fixed;
    bottom: 100px;
    right: 15px;
    background: white;
    color: #ff4d6d;
    padding: 10px;
    border-radius: 10px;
    font-size: 15px;
}
</style>
</head>

<body>

<div class="container">

    <!-- MENU -->
    <div class="menu">
        <button onclick="showPage('p1')">💌 Ungkapan</button>
        <button onclick="showPage('p2')">🥺 Pesan</button>
        <button onclick="showPage('p3')">🎮 Game</button>
        <button onclick="showPage('p4')">💖 Akhir</button>
    </div>

    <!-- UNGKAPAN -->
    <div id="p1" class="page active">
        <h2 id="t1">Klik ya 😊</h2>
        <button class="next-btn" onclick="nextKata(1)">Next ❤️</button>
    </div>

    <!-- PESAN -->
    <div id="p2" class="page">
        <h2 id="t2">Klik ya 😊</h2>
        <button class="next-btn" onclick="nextKata(2)">Next ❤️</button>
    </div>

    <!-- GAME -->
    <div id="p3" class="page">
        <h2>Main game cari hati yukk ❤️</h2>
        <div class="grid" id="grid"></div>
        <div id="msg"></div>
    </div>

    <!-- AKHIR -->
    <div id="p4" class="page">
        <h2>I ❤️ YOU</h2>
        <p>Info balik kalau suka ya 😄❤️</p>
    </div>

</div>

<!-- BONEKA -->
<div class="teddy t1">🧸</div>
<div class="teddy t2">🧸</div>
<div class="teddy t3">🧸</div>
<div class="bubble">Lopyu Nalya ❤️</div>

<script>
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* DATA */
let data = {
    1: [
        "Hai kk nona 😊",
        "Beta mau jujur sesuatu...",
        "Beta nyaman deng se ❤️",
        "Beta bahagia kalau chat deng se 😍",
        "Maaf kalau beta mengganggu 🥺",
        "Memang kedengarannya lucu, karna baru kenal langsung suka 😄",
        "yahhh Namanya juga perasaan...",
        "Iya kan? 😊"
    ],
    2: [
        "Semangat terus ee 💪",
        "Se kuat ❤️",
        "Istirahat boleh, menyerah jangan 🥺",
        "Se luar biasa ✨",
        "Pelan-pelan saja 😊",
        "Pasti berhasil 💖",
        "Jangan dengar orang yang jatuhkan se 😤",
        "Se berharga ❤️"
    ]
};

let index = {1:0,2:0};

function nextKata(page) {
    let text = document.getElementById("t"+page);
    let arr = data[page];

    if (index[page] < arr.length) {
        text.innerHTML = arr[index[page]++];
    } else {
        text.innerHTML = "❤️";
    }
}

/* HATI */
setInterval(()=>{
    let h = document.createElement("div");
    h.innerHTML = "❤️";
    h.className = "heart";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (Math.random()*25+15)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

/* GAME */
let items = ["❤️","❤️","😍","😍","💖","💖","🥰","🥰"].sort(()=>Math.random()-0.5);
let grid = document.getElementById("grid");

let first=null, second=null, lock=false, matched=0;

items.forEach(item=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML="?";

    card.onclick=()=>{
        if(lock || card.classList.contains("open")) return;

        card.innerHTML=item;
        card.classList.add("open");

        if(!first){
            first=card;
        }else{
            second=card;
            lock=true;

            if(first.innerHTML===second.innerHTML){
                matched++;
                showMsg();
                first=second=null;
                lock=false;

                if(matched===4){
                    msg.innerHTML="💖 paleng curang ee...pncuri bt hati layyy..wkwkwkwk ❤️";
                }
            }else{
                setTimeout(()=>{
                    first.innerHTML=second.innerHTML="?";
                    first.classList.remove("open");
                    second.classList.remove("open");
                    first=second=null;
                    lock=false;
                },1000);
            }
        }
    };
    grid.appendChild(card);
});

function showMsg(){
    let pesan=[
        "Se manis 😍",
        "Beta suka ❤️",
        "Se spesial 💖",
        "lopyuuuuu🥺"
    ];
    msg.innerHTML=pesan[Math.floor(Math.random()*pesan.length)];
}
</script>

</body>
</html>
